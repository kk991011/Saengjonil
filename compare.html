<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생존일지 — 함께 생존</title>
<link rel="stylesheet" href="css/compare.css">
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="header-logo">함께 생존</span>
      <div class="user-info">
        <div class="avatar" id="avatar"></div>
        <span class="user-name" id="user-name"></span>
        <span class="week-badge" id="week-badge"></span>
      </div>
    </div>
    <a href="main.html" class="nav-link">← 내 일지</a>
  </div>
</header>

<nav class="tab-nav">
  <div class="tab-nav-inner">
    <button class="tab-btn active" onclick="switchTab('rank',this)">랭킹</button>
    <button class="tab-btn" onclick="switchTab('gyeong',this)">매십경 상세</button>
    <button class="tab-btn" onclick="switchTab('myeon',this)">매십면 상세</button>
    <button class="tab-btn" onclick="switchTab('compare',this)">항목 비교</button>
    <button class="tab-btn" onclick="switchTab('group',this)">그룹별 현황</button>
  </div>
</nav>

<main class="content">

  <!-- ── 랭킹 ── -->
  <div class="tab-panel active" id="tab-rank">
    <div class="filter-row" id="rank-scope-filter">
      <button class="filter-btn on" onclick="setFilter('scope','all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('scope','mine',this)" id="btn-mygroup">내 그룹</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('progfilter','all',this)">전체 프로그램</button>
      <button class="filter-btn" onclick="setFilter('progfilter','careerpt',this)">커리어PT</button>
      <button class="filter-btn" onclick="setFilter('progfilter','maesipgyeong',this)">매십경</button>
      <button class="filter-btn" onclick="setFilter('progfilter','maesipmyeon',this)">매십면</button>
      <button class="filter-btn" onclick="setFilter('progfilter','maesipboth',this)">매십경+매십면</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('period','week',this)">이번 주</button>
      <button class="filter-btn" onclick="setFilter('period','month',this)">이번 달</button>
      <button class="filter-btn" onclick="setFilter('period','all',this)">누적</button>
      <button class="filter-btn" onclick="setFilter('period','specific_week',this)">특정 주차</button>
      <button class="filter-btn" onclick="setFilter('period','specific_month',this)">특정 월</button>
    </div>
    <div class="filter-row" id="rank-week-picker" style="display:none">
      <select onchange="setWeekFilter(this.value,'rank')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
        <option value="">주차 선택...</option>
      </select>
    </div>
    <div class="filter-row" id="rank-month-picker" style="display:none">
      <input type="month" id="rank-month-input" onchange="setMonthFilter(this.value,'rank')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
    </div>
    <div id="rank-content"><div style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
  </div>

  <!-- ── 매십경 상세 ── -->
  <div class="tab-panel" id="tab-gyeong">
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('gyscope','all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('gyscope','mine',this)">내 그룹</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('gyprogfilter','all',this)">전체 프로그램</button>
      <button class="filter-btn" onclick="setFilter('gyprogfilter','careerpt',this)">커리어PT</button>
      <button class="filter-btn" onclick="setFilter('gyprogfilter','maesipgyeong',this)">매십경</button>
      <button class="filter-btn" onclick="setFilter('gyprogfilter','maesipboth',this)">매십경+매십면</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('gyperiod','week',this)">이번 주</button>
      <button class="filter-btn" onclick="setFilter('gyperiod','month',this)">이번 달</button>
      <button class="filter-btn" onclick="setFilter('gyperiod','all',this)">누적</button>
      <button class="filter-btn" onclick="setFilter('gyperiod','specific_week',this)">특정 주차</button>
      <button class="filter-btn" onclick="setFilter('gyperiod','specific_month',this)">특정 월</button>
    </div>
    <div class="filter-row" id="gyeong-week-picker" style="display:none">
      <select onchange="setWeekFilter(this.value,'gyeong')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
        <option value="">주차 선택...</option>
      </select>
    </div>
    <div class="filter-row" id="gyeong-month-picker" style="display:none">
      <input type="month" id="gyeong-month-input" onchange="setMonthFilter(this.value,'gyeong')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
    </div>
    <div id="gyeong-content"><div style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
  </div>

  <!-- ── 매십면 상세 ── -->
  <div class="tab-panel" id="tab-myeon">
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('myscope','all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('myscope','mine',this)">내 그룹</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('myprogfilter','all',this)">전체 프로그램</button>
      <button class="filter-btn" onclick="setFilter('myprogfilter','careerpt',this)">커리어PT</button>
      <button class="filter-btn" onclick="setFilter('myprogfilter','maesipmyeon',this)">매십면</button>
      <button class="filter-btn" onclick="setFilter('myprogfilter','maesipboth',this)">매십경+매십면</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('myperiod','week',this)">이번 주</button>
      <button class="filter-btn" onclick="setFilter('myperiod','month',this)">이번 달</button>
      <button class="filter-btn" onclick="setFilter('myperiod','all',this)">누적</button>
      <button class="filter-btn" onclick="setFilter('myperiod','specific_week',this)">특정 주차</button>
      <button class="filter-btn" onclick="setFilter('myperiod','specific_month',this)">특정 월</button>
    </div>
    <div class="filter-row" id="myeon-week-picker" style="display:none">
      <select onchange="setWeekFilter(this.value,'myeon')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
        <option value="">주차 선택...</option>
      </select>
    </div>
    <div class="filter-row" id="myeon-month-picker" style="display:none">
      <input type="month" id="myeon-month-input" onchange="setMonthFilter(this.value,'myeon')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
    </div>
    <div id="myeon-content"><div style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
  </div>

  <!-- ── 항목 비교 ── -->
  <div class="tab-panel" id="tab-compare">
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('cscope','all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('cscope','mine',this)">내 그룹</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('cperiod','week',this)">이번 주</button>
      <button class="filter-btn" onclick="setFilter('cperiod','month',this)">이번 달</button>
      <button class="filter-btn" onclick="setFilter('cperiod','all',this)">누적</button>
      <button class="filter-btn" onclick="setFilter('cperiod','specific_week',this)">특정 주차</button>
      <button class="filter-btn" onclick="setFilter('cperiod','specific_month',this)">특정 월</button>
    </div>
    <div class="filter-row" id="compare-week-picker" style="display:none">
      <select onchange="setWeekFilter(this.value,'compare')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
        <option value="">주차 선택...</option>
      </select>
    </div>
    <div class="filter-row" id="compare-month-picker" style="display:none">
      <input type="month" id="compare-month-input" onchange="setMonthFilter(this.value,'compare')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
    </div>
    <button class="dl-btn" onclick="downloadExcel()">
      ↓ 엑셀 다운로드
    </button>
    <div class="table-wrap">
      <table class="cmp-table" id="cmp-table">
        <thead>
          <tr>
            <th style="width:90px">닉네임</th>
            <th style="width:36px">주차</th>
            <th style="width:44px">매십경</th>
            <th style="width:44px">매십면</th>
            <th style="width:44px">매십독</th>
            <th style="width:44px">매십운</th>
            <th style="width:36px">FA</th>
            <th style="width:50px">강의</th>
            <th style="width:50px">자소서</th>
            <th style="width:44px">필기</th>
            <th style="width:44px">면접</th>
            <th style="width:36px">지원</th>
          </tr>
        </thead>
        <tbody id="cmp-body">
          <tr><td colspan="12" style="text-align:center;padding:30px;color:#ccc">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── 그룹별 현황 ── -->
  <div class="tab-panel" id="tab-group">
    <div id="group-overview">
      <div class="filter-row">
        <button class="filter-btn on" onclick="setFilter('gperiod','week',this)">이번 주</button>
        <button class="filter-btn" onclick="setFilter('gperiod','month',this)">이번 달</button>
        <button class="filter-btn" onclick="setFilter('gperiod','all',this)">누적</button>
        <button class="filter-btn" onclick="setFilter('gperiod','specific_week',this)">특정 주차</button>
        <button class="filter-btn" onclick="setFilter('gperiod','specific_month',this)">특정 월</button>
      </div>
      <div class="filter-row" id="group-week-picker" style="display:none">
        <select onchange="setWeekFilter(this.value,'group')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
          <option value="">주차 선택...</option>
        </select>
      </div>
      <div class="filter-row" id="group-month-picker" style="display:none">
        <input type="month" id="group-month-input" onchange="setMonthFilter(this.value,'group')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
      </div>
      <div id="group-grid-wrap"><div style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
    </div>
    <div id="group-detail" style="display:none">
      <button class="back-btn" onclick="showGroupOverview()">← 그룹 목록으로</button>
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:14px">
        <div style="font-size:16px;font-weight:700;color:#222" id="detail-title"></div>
        <div style="font-size:12px;color:#aaa" id="detail-sub"></div>
      </div>
      <div id="member-list"></div>
    </div>
  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script type="module" src="js/compare.js"></script>
</body>
</html>
