<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생존일지 — 함께 생존</title>
<style>
  :root {
    --main: #534AB7; --main-dark: #3C3489; --main-mid: #7F77DD;
    --main-light: #EEEDFE; --main-xlight: #F5F4FF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f4ff; min-height: 100vh; }

  .app-header { background: var(--main); padding: 0 16px; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 720px; margin: 0 auto; display: flex; align-items: center;
    justify-content: space-between; height: 52px; }
  .header-logo { color: white; font-size: 16px; font-weight: 700; }
  .user-info { display: flex; align-items: center; gap: 8px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: #AFA9EC;
    display: flex; align-items: center; justify-content: center; font-size: 11px;
    font-weight: 600; color: #26215C; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-name { color: white; font-size: 13px; font-weight: 500; }
  .week-badge { background: rgba(255,255,255,.25); color: white; font-size: 10px;
    padding: 2px 8px; border-radius: 10px; }
  .nav-link { color: rgba(255,255,255,.85); font-size: 12px; text-decoration: none; }

  .tab-nav { background: white; border-bottom: 1px solid #eee; position: sticky; top: 52px; z-index: 99; }
  .tab-nav-inner { max-width: 720px; margin: 0 auto; display: flex; overflow-x: auto; }
  .tab-nav-inner::-webkit-scrollbar { display: none; }
  .tab-btn { padding: 12px 18px; border: none; background: transparent; font-size: 13px;
    color: #888; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent;
    font-family: inherit; transition: color .15s; }
  .tab-btn.active { color: var(--main); border-bottom-color: var(--main); font-weight: 500; }

  .content { max-width: 720px; margin: 0 auto; padding: 16px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e0e0e0;
    background: white; font-size: 12px; color: #888; cursor: pointer; font-family: inherit;
    transition: all .15s; }
  .filter-btn.on { background: var(--main); color: white; border-color: var(--main); }

  .sec-label { font-size: 11px; font-weight: 600; color: #aaa; letter-spacing: .06em;
    text-transform: uppercase; margin: 20px 0 10px; }

  /* 랭킹 */
  .rank-card { background: white; border-radius: 14px; padding: 14px 16px;
    margin-bottom: 10px; border: 1px solid #f0f0f0; }
  .rank-card-title { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 10px; }
  .rank-row { display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid #f5f5f5; }
  .rank-row:last-child { border-bottom: none; }
  .rank-row.me { background: var(--main-xlight); border-radius: 8px; padding: 8px 10px; margin: 2px -10px; }
  .rank-num { width: 22px; font-size: 13px; font-weight: 700; text-align: center;
    flex-shrink: 0; color: #ccc; }
  .rank-num.top1 { color: #f59e0b; }
  .rank-num.top2 { color: #9ca3af; }
  .rank-num.top3 { color: #cd7c3a; }
  .rank-name { flex: 1; font-size: 13px; font-weight: 500; color: #222;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rank-week { font-size: 10px; padding: 1px 6px; border-radius: 6px;
    background: var(--main-light); color: var(--main-dark); margin-left: 4px; }
  .rank-bar-wrap { width: 80px; flex-shrink: 0; }
  .rank-bar-track { height: 5px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
  .rank-bar-fill { height: 100%; background: var(--main); border-radius: 3px; transition: width .4s; }
  .rank-val { font-size: 12px; font-weight: 600; color: var(--main);
    min-width: 40px; text-align: right; flex-shrink: 0; }
  .me-tag { font-size: 10px; color: var(--main); font-weight: 600; flex-shrink: 0; }

  /* 항목 비교 테이블 */
  .table-wrap { overflow-x: auto; overflow-y: auto; max-height: 480px; border-radius: 12px; border: 1px solid #f0f0f0; }
  .cmp-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 540px; table-layout: fixed; }
  .cmp-table th { padding: 9px 8px; text-align: left; font-size: 10px; font-weight: 600;
    position: sticky; top: 0; z-index: 1;
    color: #fff; background: var(--main-dark); white-space: nowrap; overflow: hidden; }
  .cmp-table th:first-child { border-radius: 12px 0 0 0; }
  .cmp-table th:last-child { border-radius: 0 12px 0 0; }
  .cmp-table td { padding: 8px 8px; border-bottom: 1px solid #f5f5f5;
    color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cmp-table tr:last-child td { border-bottom: none; }
  .cmp-table tr.avg-row td { background: var(--main-light); font-weight: 600; color: var(--main-dark); }
  .cmp-table tr.me-row td { background: var(--main-xlight); }
  .cmp-table tr:nth-child(even):not(.avg-row):not(.me-row) td { background: #fafafa; }
  .hi { color: var(--main); font-weight: 600; }
  .dl-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    border: 1.5px solid #e0e0e0; border-radius: 8px; background: white; font-size: 12px;
    color: #666; cursor: pointer; font-family: inherit; margin-bottom: 10px; }
  .dl-btn:hover { border-color: var(--main); color: var(--main); }

  /* 그룹 현황 */
  .group-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .group-card { background: white; border: 1.5px solid #e8e8e8; border-radius: 14px;
    padding: 14px; cursor: pointer; transition: all .15s; }
  .group-card:hover { border-color: var(--main-mid); background: var(--main-xlight); }
  .group-card.mine { border-color: var(--main); background: var(--main-xlight); }
  .group-card.rank1 { }
  .group-name { font-size: 13px; font-weight: 600; color: #222; margin-bottom: 2px;
    display: flex; align-items: center; gap: 6px; }
  .group-badge { font-size: 10px; padding: 1px 6px; border-radius: 6px; }
  .badge-mine { background: var(--main); color: white; }
  .badge-rank1 { background: var(--main-light); color: var(--main-dark); }
  .group-count { font-size: 11px; color: #aaa; margin-bottom: 8px; }
  .group-stat-row { display: flex; justify-content: space-between; font-size: 11px;
    margin-bottom: 3px; }
  .group-stat-label { color: #aaa; }
  .group-stat-val { color: var(--main); font-weight: 600; }
  .group-prog-track { height: 4px; background: #f0f0f0; border-radius: 2px;
    overflow: hidden; margin-top: 8px; }
  .group-prog-fill { height: 100%; background: var(--main); border-radius: 2px; }

  /* 그룹 상세 */
  .back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none;
    cursor: pointer; color: #888; font-size: 13px; font-family: inherit; margin-bottom: 14px;
    padding: 0; }
  .back-btn:hover { color: var(--main); }
  .member-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: white; border-radius: 10px; margin-bottom: 6px; border: 1px solid #f0f0f0; }
  .member-row.me { background: var(--main-xlight); border-color: var(--main-mid); }
  .member-rank { width: 20px; font-size: 12px; font-weight: 700; color: #ccc;
    text-align: center; flex-shrink: 0; }
  .member-rank.top { color: var(--main); }
  .member-av { width: 28px; height: 28px; border-radius: 50%; background: var(--main-light);
    display: flex; align-items: center; justify-content: center; font-size: 11px;
    font-weight: 600; color: var(--main-dark); flex-shrink: 0; }
  .member-name { flex: 1; font-size: 13px; font-weight: 500; color: #222; min-width: 0; }
  .member-bars { display: flex; flex-direction: column; gap: 3px; width: 130px; flex-shrink: 0; }
  .mini-bar-row { display: flex; align-items: center; gap: 4px; }
  .mini-bar-label { font-size: 9px; color: #aaa; width: 16px; text-align: right; flex-shrink: 0; }
  .mini-bar-track { flex: 1; height: 4px; background: #f0f0f0; border-radius: 2px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 2px; background: var(--main); }
  .mini-bar-pct { font-size: 9px; color: var(--main); font-weight: 600; width: 26px; text-align: right; flex-shrink: 0; }

  /* 감사일기 */
  .diary-card { background: white; border-radius: 12px; padding: 14px 16px;
    margin-bottom: 8px; border: 1px solid #f0f0f0; }
  .diary-meta { display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px; }
  .diary-date { font-size: 11px; color: #aaa; }
  .diary-author { font-size: 11px; color: var(--main); font-weight: 500; }
  .diary-text { font-size: 14px; color: #333; line-height: 1.6; }
  .diary-card.mine { border-color: var(--main-mid); background: var(--main-xlight); }
  .diary-card.mine .diary-text { color: var(--main-dark); }

  .empty-state { text-align: center; padding: 48px 20px; }
  .empty-state p { font-size: 14px; color: #bbb; margin-top: 8px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--main-light);
    border-top-color: var(--main); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:16px; }
  .stat-card { background:white; border-radius:12px; padding:12px 14px; border:1px solid #f0f0f0; }
  .stat-label { font-size:11px; color:#aaa; margin-bottom:4px; }
  .stat-value { font-size:22px; font-weight:700; color:var(--main); }
  .stat-unit { font-size:12px; color:#aaa; margin-left:2px; }

  @media(max-width:480px) { .group-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="header-logo">함께 생존</span>
      <div class="user-info">
        <div class="avatar" id="avatar"></div>
        <span class="user-name" id="user-name"></span>
        <span class="week-badge" id="week-badge"></span>
      </div>
    </div>
    <a href="main.html" class="nav-link">← 내 일지</a>
  </div>
</header>

<nav class="tab-nav">
  <div class="tab-nav-inner">
    <button class="tab-btn active" onclick="switchTab('rank',this)">랭킹</button>
    <button class="tab-btn" onclick="switchTab('gyeong',this)">매십경 상세</button>
    <button class="tab-btn" onclick="switchTab('myeon',this)">매십면 상세</button>
    <button class="tab-btn" onclick="switchTab('compare',this)">항목 비교</button>
    <button class="tab-btn" onclick="switchTab('group',this)">그룹별 현황</button>
  </div>
</nav>

<main class="content">

  <!-- ── 랭킹 ── -->
  <div class="tab-panel active" id="tab-rank">
    <div class="filter-row" id="rank-scope-filter">
      <button class="filter-btn on" onclick="setFilter('scope','all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('scope','mine',this)" id="btn-mygroup">내 그룹</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('progfilter','all',this)">전체 프로그램</button>
      <button class="filter-btn" onclick="setFilter('progfilter','careerpt',this)">커리어PT</button>
      <button class="filter-btn" onclick="setFilter('progfilter','maesipgyeong',this)">매십경</button>
      <button class="filter-btn" onclick="setFilter('progfilter','maesipmyeon',this)">매십면</button>
      <button class="filter-btn" onclick="setFilter('progfilter','maesipboth',this)">매십경+매십면</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('period','week',this)">이번 주</button>
      <button class="filter-btn" onclick="setFilter('period','month',this)">이번 달</button>
      <button class="filter-btn" onclick="setFilter('period','all',this)">누적</button>
      <button class="filter-btn" onclick="setFilter('period','specific_week',this)">특정 주차</button>
      <button class="filter-btn" onclick="setFilter('period','specific_month',this)">특정 월</button>
    </div>
    <div class="filter-row" id="rank-week-picker" style="display:none">
      <select onchange="setWeekFilter(this.value,'rank')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
        <option value="">주차 선택...</option>
      </select>
    </div>
    <div class="filter-row" id="rank-month-picker" style="display:none">
      <input type="month" id="rank-month-input" onchange="setMonthFilter(this.value,'rank')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
    </div>
    <div id="rank-content"><div style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
  </div>

  <!-- ── 매십경 상세 ── -->
  <div class="tab-panel" id="tab-gyeong">
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('gyscope','all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('gyscope','mine',this)">내 그룹</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('gyprogfilter','all',this)">전체 프로그램</button>
      <button class="filter-btn" onclick="setFilter('gyprogfilter','careerpt',this)">커리어PT</button>
      <button class="filter-btn" onclick="setFilter('gyprogfilter','maesipgyeong',this)">매십경</button>
      <button class="filter-btn" onclick="setFilter('gyprogfilter','maesipboth',this)">매십경+매십면</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('gyperiod','week',this)">이번 주</button>
      <button class="filter-btn" onclick="setFilter('gyperiod','month',this)">이번 달</button>
      <button class="filter-btn" onclick="setFilter('gyperiod','all',this)">누적</button>
      <button class="filter-btn" onclick="setFilter('gyperiod','specific_week',this)">특정 주차</button>
      <button class="filter-btn" onclick="setFilter('gyperiod','specific_month',this)">특정 월</button>
    </div>
    <div class="filter-row" id="gyeong-week-picker" style="display:none">
      <select onchange="setWeekFilter(this.value,'gyeong')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
        <option value="">주차 선택...</option>
      </select>
    </div>
    <div class="filter-row" id="gyeong-month-picker" style="display:none">
      <input type="month" id="gyeong-month-input" onchange="setMonthFilter(this.value,'gyeong')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
    </div>
    <div id="gyeong-content"><div style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
  </div>

  <!-- ── 매십면 상세 ── -->
  <div class="tab-panel" id="tab-myeon">
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('myscope','all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('myscope','mine',this)">내 그룹</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('myprogfilter','all',this)">전체 프로그램</button>
      <button class="filter-btn" onclick="setFilter('myprogfilter','careerpt',this)">커리어PT</button>
      <button class="filter-btn" onclick="setFilter('myprogfilter','maesipmyeon',this)">매십면</button>
      <button class="filter-btn" onclick="setFilter('myprogfilter','maesipboth',this)">매십경+매십면</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('myperiod','week',this)">이번 주</button>
      <button class="filter-btn" onclick="setFilter('myperiod','month',this)">이번 달</button>
      <button class="filter-btn" onclick="setFilter('myperiod','all',this)">누적</button>
      <button class="filter-btn" onclick="setFilter('myperiod','specific_week',this)">특정 주차</button>
      <button class="filter-btn" onclick="setFilter('myperiod','specific_month',this)">특정 월</button>
    </div>
    <div class="filter-row" id="myeon-week-picker" style="display:none">
      <select onchange="setWeekFilter(this.value,'myeon')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
        <option value="">주차 선택...</option>
      </select>
    </div>
    <div class="filter-row" id="myeon-month-picker" style="display:none">
      <input type="month" id="myeon-month-input" onchange="setMonthFilter(this.value,'myeon')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
    </div>
    <div id="myeon-content"><div style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
  </div>

  <!-- ── 항목 비교 ── -->
  <div class="tab-panel" id="tab-compare">
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('cscope','all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('cscope','mine',this)">내 그룹</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('cperiod','week',this)">이번 주</button>
      <button class="filter-btn" onclick="setFilter('cperiod','month',this)">이번 달</button>
      <button class="filter-btn" onclick="setFilter('cperiod','all',this)">누적</button>
      <button class="filter-btn" onclick="setFilter('cperiod','specific_week',this)">특정 주차</button>
      <button class="filter-btn" onclick="setFilter('cperiod','specific_month',this)">특정 월</button>
    </div>
    <div class="filter-row" id="compare-week-picker" style="display:none">
      <select onchange="setWeekFilter(this.value,'compare')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
        <option value="">주차 선택...</option>
      </select>
    </div>
    <div class="filter-row" id="compare-month-picker" style="display:none">
      <input type="month" id="compare-month-input" onchange="setMonthFilter(this.value,'compare')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
    </div>
    <button class="dl-btn" onclick="downloadExcel()">
      ↓ 엑셀 다운로드
    </button>
    <div class="table-wrap">
      <table class="cmp-table" id="cmp-table">
        <thead>
          <tr>
            <th style="width:90px">닉네임</th>
            <th style="width:36px">주차</th>
            <th style="width:44px">매십경</th>
            <th style="width:44px">매십면</th>
            <th style="width:44px">매십독</th>
            <th style="width:44px">매십운</th>
            <th style="width:36px">FA</th>
            <th style="width:50px">강의</th>
            <th style="width:50px">자소서</th>
            <th style="width:44px">필기</th>
            <th style="width:44px">면접</th>
            <th style="width:36px">지원</th>
          </tr>
        </thead>
        <tbody id="cmp-body">
          <tr><td colspan="12" style="text-align:center;padding:30px;color:#ccc">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── 그룹별 현황 ── -->
  <div class="tab-panel" id="tab-group">
    <div id="group-overview">
      <div class="filter-row">
        <button class="filter-btn on" onclick="setFilter('gperiod','week',this)">이번 주</button>
        <button class="filter-btn" onclick="setFilter('gperiod','month',this)">이번 달</button>
        <button class="filter-btn" onclick="setFilter('gperiod','all',this)">누적</button>
        <button class="filter-btn" onclick="setFilter('gperiod','specific_week',this)">특정 주차</button>
        <button class="filter-btn" onclick="setFilter('gperiod','specific_month',this)">특정 월</button>
      </div>
      <div class="filter-row" id="group-week-picker" style="display:none">
        <select onchange="setWeekFilter(this.value,'group')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
          <option value="">주차 선택...</option>
        </select>
      </div>
      <div class="filter-row" id="group-month-picker" style="display:none">
        <input type="month" id="group-month-input" onchange="setMonthFilter(this.value,'group')" style="font-size:12px;padding:5px 10px;border:1px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;color:#333">
      </div>
      <div id="group-grid-wrap"><div style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
    </div>
    <div id="group-detail" style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, getDoc, collection, query, where,
  orderBy, getDocs, limit } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// Firebase 설정은 환경(운영/dev)에 따라 firebase-config.js에서 자동 선택됩니다.
import { firebaseConfig } from './firebase-config.js';

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null, userProfile = null;
let allUsers = [], allRecords = [], allGroups = [], allGoals = [];
let filters = { scope:'all', period:'week', progfilter:'all', gyscope:'all', gyperiod:'week', gyprogfilter:'all', myscope:'all', myperiod:'week', myprogfilter:'all', cscope:'all', cperiod:'week', gperiod:'week', selectedWeek: null, selectedMonth: null };
let currentTab = 'rank';

// ── 인증 ──
onAuthStateChanged(auth, async u => {
  if (!u) { window.location.href = 'index.html'; return; }
  user = u;
  const uSnap = await getDoc(doc(db, 'users', u.uid));
  if (!uSnap.exists() || !uSnap.data().onboardingDone) { window.location.href = 'index.html'; return; }
  userProfile = uSnap.data();
  applyTheme(userProfile.themeColor || '#534AB7');
  initHeader();
  await loadAllData();
  renderRank();
});

function applyTheme(color) {
  document.documentElement.style.setProperty('--main', color);
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  document.documentElement.style.setProperty('--main-dark',`rgb(${Math.round(r*.8)},${Math.round(g*.8)},${Math.round(b*.8)})`);
  document.documentElement.style.setProperty('--main-mid',`rgb(${Math.min(255,Math.round(r*1.15))},${Math.min(255,Math.round(g*1.15))},${Math.min(255,Math.round(b*1.15))})`);
  document.documentElement.style.setProperty('--main-light',`rgba(${r},${g},${b},0.12)`);
  document.documentElement.style.setProperty('--main-xlight',`rgba(${r},${g},${b},0.06)`);
}

function calcWeek(startDate) {
  const diff = Math.floor((new Date() - new Date(startDate)) / 86400000);
  return Math.max(1, Math.floor(diff / 7) + 1);
}

// 탭 컨텍스트에 따라 유저의 주차 레이블 반환
function calcWeekForUser(u, context) {
  if (context === 'gyeong' && u.gyeongStartDate) {
    return `경${calcWeek(u.gyeongStartDate)}주차`;
  }
  if (context === 'myeon' && u.myeonStartDate) {
    return `면${calcWeek(u.myeonStartDate)}주차`;
  }
  return `${calcWeek(u.startDate)}주차`;
}

let currentContext = 'default';

function initHeader() {
  const wk = calcWeek(userProfile.startDate);
  document.getElementById('user-name').textContent = userProfile.nickname;
  document.getElementById('week-badge').textContent = `${wk}`;
  const av = document.getElementById('avatar');
  if (user.photoURL) av.innerHTML = `<img src="${user.photoURL}" alt="프로필">`;
  else av.textContent = userProfile.nickname[0];
}

// ── 데이터 전체 로드 ──
async function loadAllData() {
  // 그룹 목록
  const gSnap = await getDocs(collection(db, 'groups'));
  allGroups = gSnap.docs.map(d => ({ id: d.id, ...d.data() }));

  // 전체 유저
  const uSnap = await getDocs(collection(db, 'users'));
  allUsers = uSnap.docs.map(d => ({ uid: d.id, ...d.data() }));

  // 전체 기록
  const rSnap = await getDocs(query(collection(db, 'records'), orderBy('date', 'desc')));
  allRecords = rSnap.docs.map(d => d.data());

  // 전체 주간 목표
  const gSnap2 = await getDocs(collection(db, 'weekly_goals'));
  allGoals = gSnap2.docs.map(d => d.data());
}

// ── 기간 필터 함수 ──
function getDateRange(period) {
  const now = new Date();
  if (period === 'week') {
    const day = now.getDay() || 7;
    const mon = new Date(now); mon.setDate(now.getDate() - day + 1);
    return mon.toISOString().split('T')[0];
  }
  if (period === 'month') return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  return '2000-01-01';
}

// 특정 주차(N주차)의 시작일~종료일 계산 — 각 유저의 startDate 기준
function getWeekRange(startDate, weekNum) {
  const start = new Date(startDate);
  const from = new Date(start);
  from.setDate(start.getDate() + (weekNum - 1) * 7);
  const to = new Date(from);
  to.setDate(from.getDate() + 6);
  return { from: localDateStr(from), to: localDateStr(to) };
}

function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function filterRecords(recs, period, startDate) {
  if (period === 'specific_week' && filters.selectedWeek && startDate) {
    const { from, to } = getWeekRange(startDate, Number(filters.selectedWeek));
    return recs.filter(r => r.date >= from && r.date <= to);
  }
  if (period === 'specific_month' && filters.selectedMonth) {
    return recs.filter(r => r.date.startsWith(filters.selectedMonth));
  }
  const from = getDateRange(period);
  return recs.filter(r => r.date >= from);
}

function getUserRecords(uid, period) {
  const u = allUsers.find(x => x.uid === uid);
  return filterRecords(allRecords.filter(r => r.uid === uid), period, u?.startDate);
}

function getGroupUsers(scope, progfilter) {
  let users = allUsers;
  if (scope === 'mine') users = users.filter(u => u.groupId === userProfile.groupId);
  const pf = progfilter || filters.progfilter || 'all';
  if (pf !== 'all') users = users.filter(u => (u.programType || 'careerpt') === pf);
  return users;
}

// 상위 N명 + 내 순위가 N위 밖이면 내 행도 별도로 추가
// 내 행을 상단에 고정하고 나머지를 순위대로 정렬 (전체 표시)
function buildRankRows(sorted) {
  const myIdx = sorted.findIndex(u => u.uid === user.uid);
  const rows = [];
  // 1) 내 행 먼저 (고정)
  if (myIdx !== -1) {
    rows.push({ u: sorted[myIdx], rank: myIdx + 1, isMe: true, pinned: true });
  }
  // 2) 나머지 전체 (순위순)
  sorted.forEach((u, i) => {
    if (u.uid !== user.uid) rows.push({ u, rank: i + 1, isMe: false });
  });
  return rows;
}

// ── 유저별 통계 계산 ──
function calcStats(uid, period) {
  const recs = getUserRecords(uid, period);
  const n = recs.length || 1;
  const pct = k => recs.length ? Math.round(recs.filter(r=>r[k]).length / recs.length * 100) : 0;
  const avg = k => Math.round(recs.reduce((a,r)=>a+(r[k]||0),0) / n);
  const gA = pct('gyeong_article'), gO = pct('gyeong_opinion'), gC = pct('gyeong_comment');
  const mA = pct('myeon_am'), mP = pct('myeon_pm'), mF = pct('myeon_feedback');
  return {
    gyeong: pct('routineGyeong'),
    gyeong_article: gA, gyeong_opinion: gO, gyeong_comment: gC,
    gyeongAvg: Math.round((gA + gO + gC) / 3),
    myeon: pct('routineMyeon'),
    myeon_am: mA, myeon_pm: mP, myeon_feedback: mF,
    myeonAvg: Math.round((mA + mP + mF) / 3),
    dok: pct('routineDok'), un: pct('routineUn'), fa: pct('fa5050'),
    lecture: avg('lecture'), jasoseo: avg('jasoseo'),
    pilgi: avg('pilgi'), interview: avg('interview'),
    apps: recs.reduce((a,r)=>a+(r.applications||0),0),
    days: recs.length,
  };
}

// 공통 랭킹 카드 HTML 생성 (내 행 고정 상단, 나머지 스크롤)
function buildRankCardHtml(sorted, statsMap, item, unit, context, cardStyle) {
  const maxVal = statsMap[sorted[0]?.uid]?.[item.key] || 1;
  const rows = buildRankRows(sorted);
  const myRow = rows.find(r => r.isMe);
  const othersRows = rows.filter(r => !r.isMe);

  const rowHtml = (u, rank, isMe) => {
    const val = statsMap[u.uid]?.[item.key] || 0;
    const wk = calcWeekForUser(u, context);
    const numCls = rank===1?'top1':rank===2?'top2':rank===3?'top3':'';
    return `<div class="rank-row ${isMe?'me':''}">
      <div class="rank-num ${numCls}">${rank}</div>
      <div class="rank-name">${u.nickname}<span class="rank-week">${wk}</span></div>
      ${isMe?'<span class="me-tag">나</span>':''}
      <div class="rank-bar-wrap"><div class="rank-bar-track"><div class="rank-bar-fill" style="width:${maxVal?Math.round(val/maxVal*100):0}%"></div></div></div>
      <div class="rank-val">${val}${unit}</div>
    </div>`;
  };

  let html = `<div class="rank-card" ${cardStyle||''}>
    <div class="rank-card-title">${item.label}</div>`;
  // 내 행 상단 고정 (스크롤 밖)
  if (myRow) {
    html += `<div style="border-bottom:1px solid var(--main-light)">
      ${rowHtml(myRow.u, myRow.rank, true)}
    </div>`;
  }
  // 나머지 전체 스크롤
  html += `<div style="max-height:260px;overflow-y:auto;overflow-x:hidden">`;
  othersRows.forEach(({u, rank}) => { html += rowHtml(u, rank, false); });
  html += `</div></div>`;
  return html;
}
function renderGyeongDetail() {
  const users = getGroupUsers(filters.gyscope || 'all', filters.gyprogfilter || 'all');
  const period = filters.gyperiod || 'week';
  const statsMap = {};
  users.forEach(u => { statsMap[u.uid] = calcStats(u.uid, period); });
  const items = [
    { key:'gyeongAvg', label:'매십경 — 종합 달성률', highlight:true },
    { key:'gyeong_article', label:'매십경 — 기사 읽기' },
    { key:'gyeong_opinion', label:'매십경 — 오피니언 작성' },
    { key:'gyeong_comment', label:'매십경 — 댓글 작성' },
  ];
  let html = '';
  items.forEach(item => {
    const sorted = [...users].sort((a,b) => (statsMap[b.uid]?.[item.key]||0) - (statsMap[a.uid]?.[item.key]||0));
    html += buildRankCardHtml(sorted, statsMap, item, '%', currentContext, item.highlight?'style="border:1.5px solid var(--main-mid)"':'');
  });
  document.getElementById('gyeong-content').innerHTML = html || '<div class="empty-state"><p>기록이 없어요</p></div>';
}

// ── 매십면 상세 렌더 ──
function renderMyeonDetail() {
  const users = getGroupUsers(filters.myscope || 'all', filters.myprogfilter || 'all');
  const period = filters.myperiod || 'week';
  const statsMap = {};
  users.forEach(u => { statsMap[u.uid] = calcStats(u.uid, period); });
  const items = [
    { key:'myeonAvg', label:'매십면 — 종합 달성률', highlight:true },
    { key:'myeon_am', label:'매십면 — 오전' },
    { key:'myeon_pm', label:'매십면 — 오후' },
    { key:'myeon_feedback', label:'매십면 — 동료 피드백' },
  ];
  let html = '';
  items.forEach(item => {
    const sorted = [...users].sort((a,b) => (statsMap[b.uid]?.[item.key]||0) - (statsMap[a.uid]?.[item.key]||0));
    html += buildRankCardHtml(sorted, statsMap, item, '%', currentContext, item.highlight?'style="border:1.5px solid var(--main-mid)"':'');
  });
  document.getElementById('myeon-content').innerHTML = html || '<div class="empty-state"><p>기록이 없어요</p></div>';
}

// ── 탭 전환 ──
window.switchTab = (id, btn) => {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  currentTab = id;
  // 탭에 따라 주차 컨텍스트 설정
  if (id === 'gyeong') currentContext = 'gyeong';
  else if (id === 'myeon') currentContext = 'myeon';
  else currentContext = 'default';
  if (id==='rank') renderRank();
  if (id==='gyeong') renderGyeongDetail();
  if (id==='myeon') renderMyeonDetail();
  if (id==='compare') renderCompare();
  if (id==='group') renderGroups();
};

// ── 필터 ──
const WEEK_PICKER_MAP = { period:'rank-week-picker', gyperiod:'gyeong-week-picker', myperiod:'myeon-week-picker', cperiod:'compare-week-picker', gperiod:'group-week-picker' };
const MONTH_PICKER_MAP = { period:'rank-month-picker', gyperiod:'gyeong-month-picker', myperiod:'myeon-month-picker', cperiod:'compare-month-picker', gperiod:'group-month-picker' };
const MONTH_INPUT_MAP = { period:'rank-month-input', gyperiod:'gyeong-month-input', myperiod:'myeon-month-input', cperiod:'compare-month-input', gperiod:'group-month-input' };
const TAB_KEY_MAP = { rank:'period', gyeong:'gyperiod', myeon:'myperiod', compare:'cperiod', group:'gperiod' };

window.setFilter = (key, val, btn) => {
  filters[key] = val;
  const row = btn.parentElement;
  row.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');

  // 주차/월 선택 피커 표시 처리
  const weekPickerId = WEEK_PICKER_MAP[key];
  const monthPickerId = MONTH_PICKER_MAP[key];
  if (weekPickerId) {
    const weekPicker = document.getElementById(weekPickerId);
    const monthPicker = monthPickerId ? document.getElementById(monthPickerId) : null;
    if (val === 'specific_week') {
      weekPicker.style.display = 'flex';
      if (monthPicker) monthPicker.style.display = 'none';
      populateWeekPicker(weekPicker.querySelector('select'));
    } else if (val === 'specific_month') {
      weekPicker.style.display = 'none';
      if (monthPicker) {
        monthPicker.style.display = 'flex';
        // 기본값: 이번 달
        const inputId = MONTH_INPUT_MAP[key];
        const inputEl = inputId ? document.getElementById(inputId) : null;
        if (inputEl && !inputEl.value) {
          const now = new Date();
          inputEl.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        }
        // 선택된 월로 바로 필터 적용
        if (inputEl) {
          filters.selectedMonth = inputEl.value;
        }
      }
    } else {
      weekPicker.style.display = 'none';
      if (monthPicker) monthPicker.style.display = 'none';
    }
  }

  if (currentTab==='rank') renderRank();
  if (currentTab==='gyeong') renderGyeongDetail();
  if (currentTab==='myeon') renderMyeonDetail();
  if (currentTab==='compare') renderCompare();
  if (currentTab==='group') renderGroups();
};

// 월 선택 변경 시 호출
window.setMonthFilter = (monthVal, tabKey) => {
  filters.selectedMonth = monthVal;
  if (currentTab==='rank') renderRank();
  if (currentTab==='gyeong') renderGyeongDetail();
  if (currentTab==='myeon') renderMyeonDetail();
  if (currentTab==='compare') renderCompare();
  if (currentTab==='group') renderGroups();
};

// 주차 드롭다운 채우기 — 내 기준 현재 주차부터 1주차까지
function populateWeekPicker(sel) {
  const myWeek = calcWeek(userProfile.startDate);
  sel.innerHTML = '<option value="">주차 선택...</option>';
  for (let w = myWeek; w >= 1; w--) {
    sel.innerHTML += `<option value="${w}">${w}주차</option>`;
  }
}

window.setWeekFilter = (weekVal, tabKey) => {
  filters.selectedWeek = weekVal;
  if (currentTab==='rank') renderRank();
  if (currentTab==='gyeong') renderGyeongDetail();
  if (currentTab==='myeon') renderMyeonDetail();
  if (currentTab==='compare') renderCompare();
  if (currentTab==='group') renderGroups();
};

// ── 랭킹 렌더 ──
function renderRank() {
  const users = getGroupUsers(filters.scope, filters.progfilter);
  const period = filters.period;

  const RANK_ITEMS = [
    { key:'gyeong', label:'매십경 달성률', unit:'%' },
    { key:'myeon',  label:'매십면 달성률', unit:'%' },
    { key:'dok',    label:'매십독 달성률', unit:'%' },
    { key:'un',     label:'매십운 달성률', unit:'%' },
    { key:'fa',     label:'FA5050/현장방문 달성률', unit:'%' },
    { key:'apps',   label:'총 지원 개수', unit:'개' },
    { key:'jasoseo',label:'자소서 시간 (일평균)', unit:'분' },
    { key:'lecture',label:'강의 시간 (일평균)', unit:'분' },
    { key:'pilgi',  label:'필기 시간 (일평균)', unit:'분' },
    { key:'interview',label:'면접 시간 (일평균)', unit:'분' },
  ];

  const statsMap = {};
  users.forEach(u => { statsMap[u.uid] = calcStats(u.uid, period); });

  let html = '';
  RANK_ITEMS.forEach(item => {
    const sorted = [...users].sort((a,b) => (statsMap[b.uid]?.[item.key]||0) - (statsMap[a.uid]?.[item.key]||0));
    html += buildRankCardHtml(sorted, statsMap, item, item.unit, currentContext, '');
  });

  document.getElementById('rank-content').innerHTML = html || '<div class="empty-state"><p>기록이 없어요</p></div>';
}

// ── 항목 비교 렌더 ──
function renderCompare() {
  const users = getGroupUsers(filters.cscope, filters.progfilter);
  const period = filters.cperiod;
  const statsMap = {};
  users.forEach(u => { statsMap[u.uid] = calcStats(u.uid, period); });

  // 전체 평균 계산
  const keys = ['gyeong','myeon','dok','un','fa','lecture','jasoseo','pilgi','interview','apps'];
  const avg = {};
  keys.forEach(k => {
    avg[k] = users.length ? Math.round(users.reduce((a,u)=>a+(statsMap[u.uid]?.[k]||0),0)/users.length) : 0;
  });

  // 각 항목 최대값
  const maxMap = {};
  keys.forEach(k => { maxMap[k] = Math.max(...users.map(u=>statsMap[u.uid]?.[k]||0)); });

  const row = (data, isAvg, isMe) => {
    const cls = isAvg ? 'avg-row' : isMe ? 'me-row' : '';
    const name = isAvg ? '전체 평균' : (data.nickname + (isMe ? ' 나' : ''));
    const wk = isAvg ? '—' : calcWeek(data.startDate)+'주';
    const s = isAvg ? avg : statsMap[data.uid];
    return `<tr class="${cls}">
      <td title="${name}">${name}</td><td>${wk}</td>
      <td class="${!isAvg&&s.gyeong===maxMap.gyeong?'hi':''}">${s.gyeong}%</td>
      <td class="${!isAvg&&s.myeon===maxMap.myeon?'hi':''}">${s.myeon}%</td>
      <td class="${!isAvg&&s.dok===maxMap.dok?'hi':''}">${s.dok}%</td>
      <td class="${!isAvg&&s.un===maxMap.un?'hi':''}">${s.un}%</td>
      <td class="${!isAvg&&s.fa===maxMap.fa?'hi':''}">${s.fa}%</td>
      <td class="${!isAvg&&s.lecture===maxMap.lecture?'hi':''}">${s.lecture}</td>
      <td class="${!isAvg&&s.jasoseo===maxMap.jasoseo?'hi':''}">${s.jasoseo}</td>
      <td class="${!isAvg&&s.pilgi===maxMap.pilgi?'hi':''}">${s.pilgi}</td>
      <td class="${!isAvg&&s.interview===maxMap.interview?'hi':''}">${s.interview}</td>
      <td class="${!isAvg&&s.apps===maxMap.apps?'hi':''}">${s.apps}</td>
    </tr>`;
  };

  let html = row(null, true, false);
  // 나를 제외한 나머지를 매십경 기준 내림차순 정렬
  const others = users.filter(u => u.uid !== user.uid)
    .sort((a,b) => (statsMap[b.uid]?.gyeong||0) - (statsMap[a.uid]?.gyeong||0));
  const me = users.find(u => u.uid === user.uid);
  // 전체 평균 바로 아래에 내 행을 고정, 그 다음 나머지
  if (me) html += row(me, false, true);
  others.forEach(u => { html += row(u, false, false); });
  document.getElementById('cmp-body').innerHTML = html;

  // 엑셀 다운로드용 데이터 저장 (전체 평균 바로 아래 내 행 고정 순서 유지)
  window._compareData = { users: me ? [me, ...others] : others, statsMap, avg };
}

// ── 엑셀 다운로드 ──
window.downloadExcel = () => {
  if (!window._compareData) { alert('먼저 항목 비교 탭을 열어주세요'); return; }
  const { users, statsMap, avg } = window._compareData;
  const headers = ['닉네임','주차','매십경','매십면','매십독','매십운','FA','강의','자소서','필기','면접','지원수'];
  const rows = [
    ['전체 평균','—',...['gyeong','myeon','dok','un','fa','lecture','jasoseo','pilgi','interview','apps'].map(k=>avg[k])],
    ...users.map(u => {
      const s = statsMap[u.uid];
      return [u.nickname, calcWeek(u.startDate)+'주', s.gyeong+'%', s.myeon+'%', s.dok+'%', s.un+'%', s.fa+'%', s.lecture, s.jasoseo, s.pilgi, s.interview, s.apps];
    })
  ];
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `생존일지_항목비교_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
};

// ── 그룹 현황 렌더 ──
function renderGroups() {
  const period = filters.gperiod;
  if (!allGroups.length) {
    document.getElementById('group-grid-wrap').innerHTML = '<div class="empty-state"><p>등록된 그룹이 없어요</p></div>';
    return;
  }

  // 그룹별 통계
  const groupStats = allGroups.map(g => {
    const members = allUsers.filter(u => u.groupId === g.id);
    const statsArr = members.map(u => calcStats(u.uid, period));
    const n = statsArr.length || 1;
    const avgStat = k => Math.round(statsArr.reduce((a,s)=>a+(s[k]||0),0)/n);
    return {
      ...g, memberCount: members.length,
      routineAvg: avgStat('gyeong'),
      lectureAvg: avgStat('lecture'),
      totalApps: statsArr.reduce((a,s)=>a+(s.apps||0),0),
      members,
    };
  }).sort((a,b) => b.routineAvg - a.routineAvg);

  const topGroup = groupStats[0]?.id;
  let html = '<div class="group-grid">';
  groupStats.forEach(g => {
    const isMe = g.id === userProfile.groupId;
    const isTop = g.id === topGroup;
    html += `<div class="group-card ${isMe?'mine':''}" onclick="showGroupDetail('${g.id}')">
      <div class="group-name">${g.name}
        ${isMe ? '<span class="group-badge badge-mine">내 그룹</span>' : ''}
        ${isTop && !isMe ? '<span class="group-badge badge-rank1">1위</span>' : ''}
      </div>
      <div class="group-count">${g.memberCount}명 · 클릭해서 조원 보기</div>
      <div class="group-stat-row"><span class="group-stat-label">루틴 달성</span><span class="group-stat-val">${g.routineAvg}%</span></div>
      <div class="group-stat-row"><span class="group-stat-label">강의 평균</span><span class="group-stat-val">${g.lectureAvg}분</span></div>
      <div class="group-stat-row"><span class="group-stat-label">총 지원수</span><span class="group-stat-val">${g.totalApps}개</span></div>
      <div class="group-prog-track"><div class="group-prog-fill" style="width:${g.routineAvg}%"></div></div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('group-grid-wrap').innerHTML = html;
  window._groupStats = groupStats;
}

window.showGroupDetail = (groupId) => {
  const g = window._groupStats?.find(x=>x.id===groupId);
  if (!g) return;
  document.getElementById('group-overview').style.display = 'none';
  document.getElementById('group-detail').style.display = 'block';
  document.getElementById('detail-title').textContent = `${g.name} 조원 현황`;
  document.getElementById('detail-sub').textContent = `${g.memberCount}명 · 루틴 달성 평균 ${g.routineAvg}%`;

  const period = filters.gperiod;
  const members = [...g.members].sort((a,b) => {
    const sa = calcStats(a.uid, period), sb = calcStats(b.uid, period);
    return sb.gyeong - sa.gyeong;
  });

  let html = '';
  members.forEach((m, i) => {
    const s = calcStats(m.uid, period);
    const wk = calcWeek(m.startDate);
    const isMe = m.uid === user.uid;
    html += `<div class="member-row ${isMe?'me':''}">
      <div class="member-rank ${i<3?'top':''}">${i+1}</div>
      <div class="member-av">${m.nickname[0]}</div>
      <div class="member-name">${m.nickname}${isMe?' <span style="font-size:10px;color:var(--main);font-weight:600">나</span>':''}<br>
        <span style="font-size:10px;color:#aaa">${wk}</span>
      </div>
      <div class="member-bars">
        <div class="mini-bar-row"><span class="mini-bar-label">경</span><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${s.gyeong}%"></div></div><span class="mini-bar-pct">${s.gyeong}%</span></div>
        <div class="mini-bar-row"><span class="mini-bar-label">면</span><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${s.myeon}%;opacity:.8"></div></div><span class="mini-bar-pct">${s.myeon}%</span></div>
        <div class="mini-bar-row"><span class="mini-bar-label">독</span><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${s.dok}%;opacity:.6"></div></div><span class="mini-bar-pct">${s.dok}%</span></div>
        <div class="mini-bar-row"><span class="mini-bar-label">운</span><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${s.un}%;opacity:.4"></div></div><span class="mini-bar-pct">${s.un}%</span></div>
      </div>
    </div>`;
  });
  document.getElementById('member-list').innerHTML = html || '<div class="empty-state"><p>조원 기록이 없어요</p></div>';
};

window.showGroupOverview = () => {
  document.getElementById('group-overview').style.display = 'block';
  document.getElementById('group-detail').style.display = 'none';
};
</script>
